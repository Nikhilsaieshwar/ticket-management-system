{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="p-6">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-3xl font-bold text-gray-800">Welcome, {{ user[1] }}!</h2>
        <div class="bg-blue-100 text-blue-800 px-4 py-2 rounded-lg font-semibold">
            Total Tickets: {{ total_tickets }}
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <div class="bg-white p-6 rounded-xl shadow-md">
            <h3 class="text-xl font-semibold mb-4 text-gray-700">Ticket Status Distribution</h3>
            <div class="h-64">
                <canvas id="statusChart"></canvas>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md">
            <h3 class="text-xl font-semibold mb-4 text-gray-700">System Overview</h3>
            <div class="h-64">
                <canvas id="overviewChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    // Data passed from Flask
    const statusData = {{ status_counts | tojson }};
    const totalTickets = {{ total_tickets }};

    // --- Chart 1: Doughnut Chart (Status) ---
    const ctxStatus = document.getElementById('statusChart').getContext('2d');
    new Chart(ctxStatus, {
        type: 'doughnut',
        data: {
            labels: Object.keys(statusData),
            datasets: [{
                data: Object.values(statusData),
                backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });

    // --- Chart 2: Bar Chart (Total) ---
    const ctxOverview = document.getElementById('overviewChart').getContext('2d');
    new Chart(ctxOverview, {
        type: 'bar',
        data: {
            labels: ['Total Tickets'],
            datasets: [{
                label: 'Volume',
                data: [totalTickets],
                backgroundColor: '#3b82f6',
                borderRadius: 8,
                barThickness: 60
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { beginAtZero: true }
            },
            plugins: {
                legend: { display: false }
            }
        }
    });
</script>

{% endblock %}
